<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Iniciar Sesión | Operae</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/login.css}">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">

		<div class="brand-center">
		    <div class="brand-top">
		        <div class="logo-img">
		            <img th:src="@{/assets/logo.png}" alt="Operae">
		        </div>
		        <h1>Operae</h1>
		    </div>

		    <p class="subtitle">Inicia sesión para continuar</p>
		</div>

        <form th:action="@{/login}" method="post" class="login-form">

            <div class="form-group">
                <label>Correo electrónico</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="username" placeholder="Ingrese su correo" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
					<i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <div class="login-options">
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-login">
                Iniciar sesión
            </button>
			
			    <div class="divider">
				     <span>o</span>
				</div>
			
			      <button class="btn-google" type="button">
					<img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google" class="google-icon">
			            Google
			      </button>

        </form>

        <div class="register-link">
            ¿No tienes cuenta? <a href="#">Crear una cuenta</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:if="${error}">
Swal.fire({
    title: 'Acceso denegado',
    text: '[[${error}]]',
    confirmButtonColor: '#dc2626'
});
</script>

<script th:src="@{/app.js}"></script>

</body>
</html>
