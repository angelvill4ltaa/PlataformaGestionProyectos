<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
	<div th:replace="components/sidebar :: sidebar"></div>
	<div id="overlay" class="overlay"></div>
	<div th:replace="components/navbar :: navbar"></div>
	
	<main>

	<div class="container mt-5">
	    <div class="page-header">

	        <div>

	            <div class="page-breadcrumb">
	                Administración / Proyectos
	            </div>

	            <h2 class="fw-bold mb-1">
	                Gestión de Proyectos
	            </h2>

	            <p class="text-secondary mb-0">
	                Administración de proyectos y organización de tareas
	            </p>

	        </div>

			<div class="d-flex gap-2">

			    <a th:href="@{/reportes/proyectos/pdf}"
			       class="btn btn-danger">
			        <i class="fa-solid fa-file-pdf"></i>
			        Exportar PDF
			    </a>

			    <button
			            class="btn btn-primary"
			            data-bs-toggle="modal"
			            data-bs-target="#modalProyecto">

			        <i class="fa-solid fa-plus"></i>
			        Nuevo Proyecto

			    </button>

			</div>

	    </div>

	    <div class="content-card">

	        <div class="row g-3 search-section align-items-center">

	            <form th:action="@{/proyectos}" method="get">

	                <div class="row g-3">

	                    <div class="col-md-8">

	                        <div class="input-group">

	                            <span class="input-group-text">

	                                <i class="fa-solid fa-magnifying-glass"></i>

	                            </span>

	                            <input
	                                    type="text"
	                                    name="buscar"
	                                    class="form-control"
	                                    placeholder="Buscar proyecto..."
	                                    th:value="${buscar}">

	                        </div>

	                    </div>

	                </div>

	            </form>

	        </div>

	        <div class="toolbar">

	            <div class="toolbar-info">

	                Mostrando

	                <strong th:text="${#lists.size(proyectos)}"></strong>

	                proyectos

	            </div>

	            <div th:if="${buscar != null}"
	                 class="search-result">

	                <i class="fa-solid fa-magnifying-glass"></i>

	                Resultados para:

	                <strong th:text="${buscar}"></strong>

	                <a th:href="@{/proyectos}">
	                    Limpiar
	                </a>

	            </div>

	        </div>

	        <table class="table table-hover">

	            <thead>

	                <tr>

	                    <th>ID</th>
	                    <th>Proyecto</th>
	                    <th>Descripción</th>
	                    <th>Inicio</th>
						<th>Fin</th>
	                    <th>Acciones</th>

	                </tr>

	            </thead>

	            <tbody>

	                <tr th:each="p : ${proyectos}">

	                    <td th:text="${p.idProyecto}"></td>

	                    <td>

	                        <div class="d-flex align-items-center gap-3">
	                            <span th:text="${p.nombre}"></span>
	                        </div>

	                    </td>

	                    <td th:text="${p.descripcion}"></td>

	                    <td th:text="${#temporals.format(p.fechaInicio,'dd/MM/yyyy')}"></td>
						
						<td th:text="${#temporals.format(p.fechaFin,'dd/MM/yyyy')}"></td>

	                    <td>

	                        <div class="d-flex gap-2">

								<button
								    class="btn btn-sm btn-outline-primary btn-editar-proyecto"

								    th:attr="
								        data-id=${p.idProyecto},
								        data-nombre=${p.nombre},
								        data-descripcion=${p.descripcion},
								        data-inicio=${p.fechaInicio},
								        data-fin=${p.fechaFin}"

								    data-bs-toggle="modal"
								    data-bs-target="#editarProyectoModal">

								    <i class="fa-solid fa-pen"></i>

								</button>

								<a
								    th:href="@{/proyectos/eliminar/{id}(id=${p.idProyecto})}"
								    class="btn btn-sm btn-outline-danger eliminar-proyecto">

								    <i class="fa-solid fa-trash"></i>

								</a>

	                        </div>

	                    </td>

	                </tr>

	            </tbody>

	            <tbody th:if="${#lists.isEmpty(proyectos)}">

	                <tr>

	                    <td colspan="6"
	                        class="text-center py-5">

	                        <i class="fa-solid fa-diagram-project fa-3x mb-3 text-secondary"></i>

	                        <p>
	                            No existen proyectos registrados.
	                        </p>

	                    </td>

	                </tr>

	            </tbody>

	        </table>

			<nav class="pagination-wrapper">

			    <ul class="pagination justify-content-center align-items-center mb-0">

			        <li class="page-item"
			            th:classappend="${paginaActual == 0} ? 'disabled'">

			            <a class="page-link nike-pagination"
			               th:href="@{/proyectos(pagina=${paginaActual - 1})}">

			                <i class="fa-solid fa-chevron-left"></i>

			            </a>

			        </li>

			        <li class="page-item">

			            <span class="page-current">

			                Página
			                <strong th:text="${paginaActual + 1}"></strong>

			                de

			                <strong th:text="${totalPaginas}"></strong>

			            </span>

			        </li>

			        <li class="page-item"
			            th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">

			            <a class="page-link nike-pagination"
			               th:href="@{/proyectos(pagina=${paginaActual + 1})}">

			                <i class="fa-solid fa-chevron-right"></i>

			            </a>

			        </li>

			    </ul>

			</nav>

	    </div>

	</div>

	</main>
	
	<div class="modal fade"
	     id="modalProyecto"
	     tabindex="-1">

	    <div class="modal-dialog modal-dialog-centered">

	        <div class="modal-content">

	            <div class="modal-header">

	                <h5 class="modal-title">
	                    Registrar Proyecto
	                </h5>

	                <button
	                        type="button"
	                        class="btn-close"
	                        data-bs-dismiss="modal">
	                </button>

	            </div>

	            <form th:action="@{/proyectos/guardar}"
	                  method="post">

	                <div class="modal-body">

	                    <div class="mb-3">

	                        <label>Nombre</label>

	                        <input
	                                type="text"
	                                name="nombre"
	                                class="form-control"
	                                required>

	                    </div>

						<div class="mb-3">
						    <label>Descripción</label>

						    <textarea
						        name="descripcion"
						        class="form-control"
						        required></textarea>
						</div>

						<div class="mb-3">
						    <label>Fecha Inicio</label>

						    <input
						        type="date"
						        name="fechaInicio"
						        class="form-control"
						        required>
						</div>

						<div class="mb-3">
						    <label>Fecha Fin</label>

						    <input
						        type="date"
						        name="fechaFin"
						        class="form-control"
						        required>
						</div>

	                </div>

	                <div class="modal-footer">

	                    <button
	                            type="button"
	                            class="btn btn-secondary"
	                            data-bs-dismiss="modal">

	                        Cancelar

	                    </button>

	                    <button
	                            type="submit"
	                            class="btn btn-primary">

	                        Guardar

	                    </button>

	                </div>

	            </form>

	        </div>

	    </div>

	</div>

	<div class="modal fade"
	     id="editarProyectoModal"
	     tabindex="-1">

	    <div class="modal-dialog modal-dialog-centered">

	        <div class="modal-content">

	            <div class="modal-header">

	                <h5 class="modal-title">
	                    Editar Proyecto
	                </h5>

	                <button
	                        type="button"
	                        class="btn-close"
	                        data-bs-dismiss="modal">
	                </button>

	            </div>

				<form id="formEditarProyecto"
				      th:action="@{/proyectos/actualizar}"
				      method="post">

				    <div class="modal-body">

				        <input
				            type="hidden"
				            id="editIdProyecto"
				            name="idProyecto">

				        <div class="mb-3">

				            <label>Nombre</label>

				            <input
				                type="text"
				                id="editNombreProyecto"
				                name="nombre"
				                class="form-control"
				                required>

				        </div>

				        <div class="mb-3">

				            <label>Descripción</label>

				            <textarea
				                id="editDescripcionProyecto"
				                name="descripcion"
				                class="form-control"
				                rows="3"
				                required>
				            </textarea>

				        </div>

				        <div class="mb-3">

				            <label>Fecha Inicio</label>

				            <input
				                type="date"
				                id="editFechaInicioProyecto"
				                name="fechaInicio"
				                class="form-control"
				                required>

				        </div>

				        <div class="mb-3">

				            <label>Fecha Fin</label>

				            <input
				                type="date"
				                id="editFechaFinProyecto"
				                name="fechaFin"
				                class="form-control"
				                required>

				        </div>

				    </div>

				    <div class="modal-footer">

				        <button
				            type="button"
				            class="btn btn-secondary"
				            data-bs-dismiss="modal">

				            Cancelar

				        </button>

				        <button
				            type="submit"
				            class="btn btn-primary">

				            Actualizar

				        </button>

				    </div>

				</form>

	        </div>

	    </div>
	</div>
	
	<div th:replace="components/footer :: footer"></div>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script th:src="@{/app.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<script th:if="${success}">
	Swal.fire({
	    icon: 'success',
	    title: 'Éxito',
	    text: '[[${success}]]',
	    confirmButtonColor: '#2563eb'
	});
	</script>
	<script th:if="${error}">
	Swal.fire({
	    icon: 'error',
	    title: 'Error',
	    text: '[[${error}]]',
	    confirmButtonColor: '#dc2626'
	});
	</script>
	
	</body> 
	</html>
