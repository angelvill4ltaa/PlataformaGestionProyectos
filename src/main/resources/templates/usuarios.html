<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Usuarios</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
	<div th:replace="components/sidebar :: sidebar"></div>
	<div id="overlay" class="overlay"></div>
	<div th:replace="components/navbar :: navbar"></div>
		
<main>

<div class="container mt-5">
	<div class="page-header">
	    <div>	
			<div class="page-breadcrumb">
			     Administración / Usuarios
			</div>
			
	        <h2 class="fw-bold mb-1">
	            Gestión de Usuarios
	        </h2>

	        <p class="text-secondary mb-0">
	            Administración y control de usuarios del sistema
	        </p>
	    </div>

		<div class="d-flex gap-2">
		    <a th:href="@{/reportes/usuarios/pdf}" class="btn btn-danger">
		        <i class="fa-solid fa-file-pdf"></i> Exportar PDF
		    </a>
		    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUsuario">
		        <i class="fa-solid fa-plus"></i> Nuevo Usuario
		    </button>
		</div>
	</div>
		
			<div class="content-card">

				<div class="row g-3 search-section align-items-center">

				    <form th:action="@{/usuarios}" method="get">

				        <div class="row g-3">

				            <div class="col-md-6">
				                <div class="input-group">
				                    <span class="input-group-text">
				                        <i class="fa-solid fa-magnifying-glass"></i>
				                    </span>
									
				                    <input
				                            type="text"
				                            name="buscar"
				                            class="form-control"
				                            placeholder="Buscar..."
				                            th:value="${buscar}">
				                </div>
				            </div>

				            <div class="col-md-3">
				                <select
				                        name="ordenar"
				                        class="form-select"
				                        onchange="this.form.submit()">

										<option value="">
										    Ordenar por
										</option>

										<option value="nombre"
										        th:selected="${ordenar == 'nombre'}">
										    Nombre A-Z
										</option>

										<option value="fecha"
										        th:selected="${ordenar == 'fecha'}">
										    Más recientes
										</option>

				                </select>
				            </div>

				            <div class="col-md-3">
				                <select
				                        name="rol"
				                        class="form-select"
				                        onchange="this.form.submit()">

				                    <option value="">
				                        Todos los roles
				                    </option>

				                    <option
				                            th:each="r : ${roles}"
				                            th:value="${r.idRol}"
				                            th:text="${r.nombre}"
				                            th:selected="${rolSeleccionado == r.idRol}">
				                    </option>

				                </select>
				            </div>

				        </div>

				    </form>

				</div>	
			
				<div class="toolbar">
				    <div class="toolbar-info">
				        Mostrando
				        <strong th:text="${#lists.size(usuarios)}"></strong>
				        usuarios
				    </div>

				    <div th:if="${buscar != null}" class="search-result">
				        <i class="fa-solid fa-magnifying-glass"></i>
				        Resultados para:

				        <strong th:text="${buscar}"></strong>

				        <a th:href="@{/usuarios}">
				            Limpiar
				        </a>
				    </div>
				</div>

            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
						<th>Registro</th>
                        <th>Rol</th>
						<th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="u : ${usuarios}">

                        <td th:text="${u.idUsuario}"></td>

						<td>
						    <div class="d-flex align-items-center gap-3">
						        <div class="avatar" th:text="${#strings.substring(u.nombre,0,1)}"></div>
						        <span th:text="${u.nombre}"></span>
						    </div>
						</td>

                        <td th:text="${u.correo}"></td>
						
						<td th:text="${#temporals.format(u.fechaRegistro,'dd/MM/yyyy')}"></td>

						<td>
						    <span class="badge-role"th:text="${u.rol.nombre}"></span>
						</td>
						
						<td>
						    <span th:if="${u.activo}" class="badge bg-success">
						        Activo
						    </span>

						    <span th:unless="${u.activo}" class="badge bg-danger">
						        Inactivo
						    </span>
						</td>
						
                        <td>
							<div class="d-flex gap-2">

							<button class="btn btn-sm btn-outline-primary btn-editar"
							        th:attr="
							            data-id=${u.idUsuario},
							            data-nombre=${u.nombre},
							            data-correo=${u.correo},
							            data-rol=${u.rol.idRol},
										data-propio=${session.usuario != null and session.usuario.idUsuario == u.idUsuario}"

							        data-bs-toggle="modal"
							        data-bs-target="#editarModal">

							    <i class="fa-solid fa-pen"></i>
							</button>
							
							<a th:href="@{/usuarios/estado/{id}(id=${u.idUsuario})}"
							   th:classappend="${u.activo}
							       ? 'btn-outline-warning'
							       : 'btn-outline-success'"

							   class="btn btn-sm">

							    <i th:class="${u.activo}
							        ? 'fa-solid fa-user-slash'
							        : 'fa-solid fa-user-check'">
							    </i>
							</a>
							</div>
                        </td>
                    </tr>
                </tbody>
				
				<tbody th:if="${#lists.isEmpty(usuarios)}">
				<tr>
				<td colspan="6" class="text-center py-5">
				    <i class="fa-solid fa-users fa-3x mb-3 text-secondary"></i>
				    <p>No existen usuarios registrados.</p>
				</td>
				</tr>
				</tbody>
            </table>
			
			<nav class="pagination-wrapper" th:if="${totalPaginas > 1}">
			    <ul class="pagination justify-content-center align-items-center mb-0">
			        <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
			            <a class="page-link nike-pagination"
						th:href="@{/usuarios(
						    pagina=${paginaActual-1},
						    ordenar=${ordenar})}">
			                <i class="fa-solid fa-chevron-left"></i>
			            </a>
			        </li>

			        <li class="page-item">
			            <span class="page-current">
			                Página
			                <strong th:text="${paginaActual + 1}"></strong>
			                de
			                <strong th:text="${totalPaginas}"></strong>
			            </span>
			        </li>

			        <li class="page-item" th:classappend="${paginaActual == totalPaginas-1} ? 'disabled'">
			            <a class="page-link nike-pagination"
						th:href="@{/usuarios(
						    pagina=${paginaActual+1},
						    ordenar=${ordenar})}">
			                <i class="fa-solid fa-chevron-right"></i>
			            </a>
			        </li>
			    </ul>
			</nav> 

</div>
</main>

<div class="modal fade" id="modalUsuario" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Registrar Usuario
                </h5>
                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <form th:action="@{/usuarios/guardar}"
                  method="post">

                <div class="modal-body">
                    <div class="mb-3">
                        <label>Nombre</label>
                        <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                required>
                    </div>

                    <div class="mb-3">
                        <label>Correo</label>
                        <input
                                type="email"
                                name="correo"
                                class="form-control"
                                required>
                    </div>

                    <div class="mb-3">
                        <label>Rol</label>
                        <select name="rol.idRol" class="form-select">
                            <option
                                    th:each="r : ${roles}"
                                    th:value="${r.idRol}"
                                    th:text="${r.nombre}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">

                    <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button
                            type="submit"
                            class="btn btn-primary">

                        Guardar

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<div class="modal fade" id="editarModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Editar Usuario
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="formEditarUsuario"
			      th:action="@{/usuarios/actualizar}"
                  method="post">

                <div class="modal-body">
                    <input
                            type="hidden"
                            id="editId"
                            name="idUsuario">

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input
                                type="text"
                                id="editNombre"
                                name="nombre"
                                class="form-control"
                                required>
                    </div>

                    <div class="mb-3">
                        <label>Correo</label>
                        <input
                                type="email"
                                id="editCorreo"
                                name="correo"
                                class="form-control"
                                required>
                    </div>

                    <div class="mb-3">
                        <label>Rol</label>
                        <select id="editRol" name="rol.idRol" class="form-select">
                            <option
                                    th:each="r : ${roles}"
                                    th:value="${r.idRol}"
                                    th:text="${r.nombre}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Actualizar
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<div th:replace="components/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${success}">
Swal.fire({
    icon: 'success',
    title: 'Éxito',
    text: '[[${success}]]',
    confirmButtonColor: '#2563eb'
});
</script>
<script th:if="${error}">
Swal.fire({
    icon: 'error',
    title: 'Error',
    text: '[[${error}]]',
    confirmButtonColor: '#dc2626'
});
</script>

</body> 
</html>
