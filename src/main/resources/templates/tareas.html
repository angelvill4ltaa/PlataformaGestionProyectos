<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Tareas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
<div th:replace="components/sidebar :: sidebar"></div>
<div id="overlay" class="overlay"></div>
<div th:replace="components/navbar :: navbar"></div>

<main>
	
<div class="container mt-5">

    <div class="page-header">
        <div>
            <div class="page-breadcrumb">
                Administración / Tareas
            </div>

            <h2 class="fw-bold mb-1">
                Gestión de Tareas
            </h2>

            <p class="text-secondary mb-0">
                Control de actividades, estados y asignaciones
            </p>
        </div>

		<div class="d-flex gap-2">
		    <a th:href="@{/reportes/tareas/pdf}" class="btn btn-danger">
		        <i class="fa-solid fa-file-pdf"></i> Exportar PDF
		    </a>
		    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTarea">
		        <i class="fa-solid fa-plus"></i> Nueva Tarea
		    </button>
		</div>
    </div>

    <div class="content-card">

        <div class="row g-3 search-section align-items-center">
            <form th:action="@{/tareas}" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </span>
                            <input type="text"
                                   name="buscar"
                                   class="form-control"
                                   placeholder="Buscar tarea..."
                                   th:value="${buscar}">
                        </div>
                    </div>
					
					<div class="col-md-3">
					<select name="proyecto" class="form-select" onchange="this.form.submit()">
					    <option value="">
					        Todos los proyectos
					    </option>
					    <option th:each="p : ${proyectos}"
					            th:value="${p.idProyecto}"
					            th:text="${p.nombre}">
					    </option>
					</select>
					</div>

                    <div class="col-md-2">
                        <select name="estado" class="form-select" onchange="this.form.submit()">
                            <option value="">Todos los estados</option>
                            <option value="PENDIENTE">Pendiente</option>
                            <option value="EN_PROCESO">En proceso</option>
                            <option value="FINALIZADO">Finalizado</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select name="prioridad" class="form-select" onchange="this.form.submit()">
                            <option value="">Prioridad</option>
                            <option value="ALTA">Alta</option>
                            <option value="MEDIA">Media</option>
                            <option value="BAJA">Baja</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <table class="table table-hover">
            <thead>
            <tr>
                <th>Título</th>
                <th>Usuario</th>
                <th>Proyecto</th>
                <th>Fecha límite</th>
                <th>Estado</th>
                <th>Prioridad</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="t : ${tareas}">

                <td>
                    <div class="fw-semibold" th:text="${t.titulo}"></div>
                    <small class="text-muted" th:text="${t.descripcion}"></small>
                </td>

                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar" th:text="${#strings.substring(t.usuario.nombre,0,1)}"></div>
                        <span th:text="${t.usuario.nombre}"></span>
                    </div>
                </td>

                <td th:text="${t.proyecto.nombre}"></td>

                <td th:text="${#temporals.format(t.fechaLimite,'dd/MM/yyyy')}"></td>

				<td>
				    <span class="status-badge"
				          th:text="${t.estado}"
				          th:classappend="${t.estado == 'FINALIZADO'} ? ' status-done' :
				          (${t.estado == 'EN_PROCESO'} ? ' status-progress' : ' status-pending')">
				    </span>
				</td>

				<td>
				    <span class="priority-badge"
				          th:text="${t.prioridad}"
				          th:classappend="${t.prioridad == 'ALTA'} ? ' priority-high' :
				          (${t.prioridad == 'MEDIA'} ? ' priority-medium' : ' priority-low')">
				    </span>
				</td>

				<td>
				                    <div class="d-flex gap-2">

				                        <button class="btn btn-sm btn-outline-primary btn-editar-tarea"
				                                data-id="${t.idTarea}"
				                                th:attr="
				                                    data-id=${t.idTarea},
				                                    data-titulo=${t.titulo},
				                                    data-descripcion=${t.descripcion},
				                                    data-usuario=${t.usuario.idUsuario},
				                                    data-proyecto=${t.proyecto.idProyecto},
				                                    data-fecha=${t.fechaLimite},
				                                    data-estado=${t.estado},
				                                    data-prioridad=${t.prioridad}"
				                                data-bs-toggle="modal"
				                                data-bs-target="#editarTareaModal">
												
				                            <i class="fa-solid fa-pen"></i>
				                        </button>

				                        <a th:href="@{/tareas/eliminar/{id}(id=${t.idTarea})}"
				                           class="btn btn-sm btn-outline-danger eliminar-tarea">
				                            <i class="fa-solid fa-trash"></i>
				                        </a>

				                    </div>
				                </td>
            </tr>
			
			</tbody>

            <tbody th:if="${#lists.isEmpty(tareas)}">
            <tr>
                <td colspan="7" class="text-center py-5">
                    <i class="fa-solid fa-list-check fa-3x mb-3 text-secondary"></i>
                    <p>No existen tareas registradas.</p>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
	
	<nav class="pagination-wrapper" th:if="${totalPaginas > 1}">

				    <ul class="pagination justify-content-center align-items-center mb-0">
				        <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
				            <a class="page-link nike-pagination"
							th:href="@{/tareas(pagina=${paginaActual-1})}">
				                <i class="fa-solid fa-chevron-left"></i>
				            </a>
				        </li>

				        <li class="page-item">
				            <span class="page-current">
				                Página
				                <strong th:text="${paginaActual + 1}"></strong>
				                de
				                <strong th:text="${totalPaginas}"></strong>
				            </span>
				        </li>

				        <li class="page-item" th:classappend="${paginaActual == totalPaginas-1} ? 'disabled'">
				            <a class="page-link nike-pagination"
							th:href="@{/tareas(pagina=${paginaActual+1})}">
				                <i class="fa-solid fa-chevron-right"></i>
				            </a>
				        </li>
				    </ul>

				</nav> 

</div>
</main>

<div class="modal fade" id="modalTarea" tabindex="-1">

					    <div class="modal-dialog modal-dialog-centered">

					        <div class="modal-content">

					            <div class="modal-header">
					                <h5 class="modal-title">Nueva Tarea</h5>
					                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					            </div>

					            <form th:action="@{/tareas/guardar}" method="post">

					                <div class="modal-body">

					                    <div class="mb-3">
					                        <label>Título</label>
					                        <input type="text" name="titulo" class="form-control" required>
					                    </div>

					                    <div class="mb-3">
					                        <label>Descripción</label>
					                        <textarea name="descripcion" class="form-control" required></textarea>
					                    </div>

					                    <div class="mb-3">
					                        <label>Fecha límite</label>
					                        <input type="date" name="fechaLimite" class="form-control" required>
					                    </div>

					                    <div class="mb-3">
					                        <label>Estado</label>
					                        <select name="estado" class="form-select">
					                            <option>PENDIENTE</option>
					                            <option>EN_PROCESO</option>
					                            <option>FINALIZADO</option>
					                        </select>
					                    </div>

					                    <div class="mb-3">
					                        <label>Prioridad</label>
					                        <select name="prioridad" class="form-select">
					                            <option>BAJA</option>
					                            <option>MEDIA</option>
					                            <option>ALTA</option>
					                        </select>
					                    </div>

					                    <div class="mb-3">
					                        <label>Usuario</label>
					                        <select name="usuario.idUsuario" class="form-select">
					                            <option th:each="u : ${usuarios}"
					                                    th:value="${u.idUsuario}"
					                                    th:text="${u.nombre}">
					                            </option>
					                        </select>
					                    </div>

					                    <div class="mb-3">
					                        <label>Proyecto</label>
					                        <select name="proyecto.idProyecto" class="form-select">
					                            <option th:each="p : ${proyectos}"
					                                    th:value="${p.idProyecto}"
					                                    th:text="${p.nombre}">
					                            </option>
					                        </select>
					                    </div>

					                </div>

					                <div class="modal-footer">
					                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
					                    <button class="btn btn-primary">Guardar</button>
					                </div>

					            </form>

					        </div>

					    </div>

					</div>
					
					<div class="modal fade" id="editarTareaModal" tabindex="-1">

					    <div class="modal-dialog modal-dialog-centered">

					        <div class="modal-content">

					            <div class="modal-header">
					                <h5 class="modal-title">Editar Tarea</h5>
					                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					            </div>

					            <form th:action="@{/tareas/actualizar}" method="post">

					                <div class="modal-body">

					                    <input type="hidden" id="editIdTarea" name="idTarea">

					                    <div class="mb-3">
					                        <label>Título</label>
					                        <input type="text" id="editTitulo" name="titulo" class="form-control">
					                    </div>

					                    <div class="mb-3">
					                        <label>Descripción</label>
					                        <textarea id="editDescripcion" name="descripcion" class="form-control"></textarea>
					                    </div>

					                    <div class="mb-3">
					                        <label>Fecha límite</label>
					                        <input type="date" id="editFecha" name="fechaLimite" class="form-control">
					                    </div>
										
										<div class="mb-3">
							                <label>Estado</label>
											<select id="editEstado" name="estado" class="form-select">
											    <option value="PENDIENTE">PENDIENTE</option>
											    <option value="EN_PROCESO">EN_PROCESO</option>
											    <option value="FINALIZADO">FINALIZADO</option>
											</select>
										</div>
										<div class="mb-3">
															                        <label>Prioridad</label>
															                        <select id="editPrioridad" name="prioridad" class="form-select">
															                            <option>BAJA</option>
															                            <option>MEDIA</option>
															                            <option>ALTA</option>
															                        </select>
															                    </div>
										<div class="mb-3">
															                        <label>Usuario</label>
																					<select id="editUsuario" name="usuario.idUsuario" class="form-select">
															                            <option th:each="u : ${usuarios}"
															                                    th:value="${u.idUsuario}"
															                                    th:text="${u.nombre}">
															                            </option>
															                        </select>
															                    </div>

															                    <div class="mb-3">
															                        <label>Proyecto</label>
																					<select id="editProyecto" name="proyecto.idProyecto" class="form-select">
															                            <option th:each="p : ${proyectos}"
															                                    th:value="${p.idProyecto}"
															                                    th:text="${p.nombre}">
															                            </option>
															                        </select>
															                    </div>

					                </div>

					                <div class="modal-footer">
					                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
					                    <button class="btn btn-primary">Actualizar</button>
					                </div>

					            </form>

					        </div>

					    </div>
					</div>

<div th:replace="components/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
						
	<script th:if="${success}">
	Swal.fire({
		icon: 'success',
		title: 'Éxito',
	    text: '[[${success}]]',
		confirmButtonColor: '#2563eb'
	});
	</script>
</body>
</html>
