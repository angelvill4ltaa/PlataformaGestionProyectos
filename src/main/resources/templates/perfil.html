<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mi Perfil</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div th:replace="components/sidebar :: sidebar"></div>
<div id="overlay" class="overlay"></div>
<div th:replace="components/navbar :: navbar"></div>

<span id="usuarioIdData" th:data-id="${usuario != null ? usuario.idUsuario : 0}" style="display:none"></span>

<main>
<div class="container-fluid px-4 mt-4">

    <div class="perfil-hero">
        <div class="perfil-avatar-big">
            <span th:text="${usuario.nombre.substring(0,1).toUpperCase()}"></span>
        </div>
        <div class="perfil-hero-info">
            <h2 th:text="${usuario.nombre}">Nombre</h2>
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="rol-badge" th:text="${usuario.rol.nombre}">Rol</span>
                <span class="estado-badge" th:if="${usuario.activo}">
                    <i class="fa-solid fa-circle" style="font-size:7px"></i> Activo
                </span>
                <span class="estado-badge estado-badge-inactivo" th:unless="${usuario.activo}">
                    Inactivo
                </span>
            </div>
            <p class="perfil-correo" th:text="${usuario.correo}"></p>
        </div>
        <div class="ms-auto d-flex gap-2 flex-wrap align-items-start">
            <a href="#" class="btn-edit-perfil">
                <i class="fa-solid fa-pen"></i> Editar perfil
            </a>
            <a th:href="@{/logout}" class="btn-logout-perfil">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
            </a>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-lg-8">
            <div class="perfil-card">
                <div class="perfil-card-title">
                    <i class="fa-solid fa-user"></i> Información personal
                </div>
                <div class="perfil-field">
                    <label>Nombre completo</label>
                    <span th:text="${usuario.nombre}"></span>
                </div>
                <div class="perfil-field">
                    <label>Correo electrónico</label>
                    <span th:text="${usuario.correo}"></span>
                </div>
                <div class="perfil-field">
                    <label>Rol en la plataforma</label>
                    <span th:text="${usuario.rol.nombre}"></span>
                </div>
                <div class="perfil-field">
                    <label>Miembro desde</label>
                    <span th:text="${usuario.fechaRegistro}"></span>
                </div>
                <div class="perfil-field">
                    <label>Estado de cuenta</label>
                    <span>
                        <span class="estado-badge estado-badge-activo" th:if="${usuario.activo}">Activo</span>
                        <span class="estado-badge estado-badge-inactivo" th:unless="${usuario.activo}">Inactivo</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="perfil-card">
                <div class="perfil-card-title">
                    <i class="fa-solid fa-shield-halved"></i> Seguridad
                </div>
                <div class="perfil-field">
                    <label>Contraseña</label>
                    <span>••••••</span>
                </div>
                <div class="mt-3">
                    <a href="#" class="btn-edit-perfil" style="width:100%;justify-content:center;">
                        <i class="fa-solid fa-lock"></i> Cambiar contraseña
                    </a>
                </div>
            </div>

            <div class="perfil-card">
                <div class="perfil-card-title">
                    <i class="fa-solid fa-chart-simple"></i> Actividad
                </div>
                <div class="row g-2">
                    <div class="col-12">
                        <div class="perfil-stat accent-indigo">
                            <div class="stat-num" id="statTareas">—</div>
                            <div class="stat-label">Tareas asignadas</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="perfil-stat accent-green">
                            <div class="stat-num" id="statCompletadas">—</div>
                            <div class="stat-label">Completadas</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="perfil-stat accent-amber">
                            <div class="stat-num" id="statPendientes">—</div>
                            <div class="stat-label">Pendientes</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</main>

<script th:src="@{/app.js}"></script>
<div th:replace="components/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
