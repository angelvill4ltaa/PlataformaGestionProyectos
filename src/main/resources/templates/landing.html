<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Operae | Gestión de Proyectos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/landing.css}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<nav class="navbar">
	<div class="container">
		
	    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">     
			 <div class="logo-img-navbar">
			     <img th:src="@{/assets/logo.png}" alt="Operae">
			  </div>
			  <span>Operae</span>
	    </a>

            <a th:href="@{/login}" class="btn btn-login">
                Iniciar sesión
            </a>

	</div>
</nav>

<section class="hero container">
    <div class="hero-content">

        <div class="hero-badge">
            Plataforma de gestión de proyectos
        </div>

        <h1 class="hero-title">
            Organiza proyectos, tareas y equipos sin caos.
        </h1>

        <p class="hero-description">
            Operae centraliza tu trabajo en un solo sistema, permitiendo gestionar proyectos,
            asignar tareas y dar seguimiento en tiempo real desde un solo lugar.
        </p>

        <div class="hero-actions">
            <a th:href="@{/login}" class="btn-primary">
                Empezar ahora
            </a>

            <a class="btn-secondary">
                Explorar
            </a>
        </div>
    </div>

</section>

	<div th:replace="components/footer :: footer"></div>

</body>
</html>
